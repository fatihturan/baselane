version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20

  pre_build:
    commands:
      - echo "Deploying website scripts to S3..."
      - echo "Target bucket: $S3_BUCKET"
      - echo "CloudFront distribution: $CLOUDFRONT_DISTRIBUTION_ID"

  build:
    commands:
      # Sync all files to S3, excluding non-deployable files
      - |
        aws s3 sync . s3://$S3_BUCKET \
          --delete \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude ".gitignore" \
          --exclude "workers/*" \
          --exclude "buildspec.yml" \
          --exclude "README.md" \
          --cache-control "public, max-age=86400"

  post_build:
    commands:
      # Invalidate CloudFront cache so new files are served immediately
      - |
        aws cloudfront create-invalidation \
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
          --paths "/*"
      - echo "Deploy complete. CloudFront invalidation triggered."
